# Spring Boot Test Configuration
# Uses MySQL database for testing

spring.application.name=quantity_measurement_app

# MySQL Database Configuration for Testing
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration for Testing
logging.level.root=WARN
logging.level.com.example.quantity_measurement_app=DEBUG
logging.level.org.springframework.test=DEBUG

# Server Configuration for Testing
server.port=8080
